
name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython buildozer

      - name: Setup Android SDK with build-tools (ACCEPT LICENSES)
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip -d $HOME/android
          export ANDROID_SDK_ROOT=$HOME/android
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/bin:$ANDROID_SDK_ROOT/platform-tools
          # Принимаем все лицензии автоматически
          yes | $ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager --licenses
          # Устанавливаем только то, что нужно (НЕ ставим 37-rc)
          $ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Build APK
        run: |
          buildozer init
          sed -i 's/title = My Application/title = Super Tic Tac Toe/' buildozer.spec
          sed -i 's/package.name = myapp/package.name = supertic/' buildozer.spec
          sed -i 's/package.domain = org.test/package.domain = org.supertic/' buildozer.spec
          sed -i 's/requirements = python3,kivy/requirements = python3,pygame,requests,websocket-client/' buildozer.spec
          sed -i 's/#android.permissions = .*/android.permissions = INTERNET/' buildozer.spec
          sed -i 's/#android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: supertic-apk
          path: bin/*.apk
