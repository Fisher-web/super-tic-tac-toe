name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython buildozer

      - name: Pre-download Android NDK (using mirror)
        run: |
          mkdir -p ~/.buildozer/android/platform
          cd ~/.buildozer/android/platform
          # Используем официальное зеркало, которое должно работать
          wget -O android-ndk-r25b-linux.zip https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          # Если зеркало не сработает, пробуем альтернативное
          if [ ! -f android-ndk-r25b-linux.zip ]; then
            wget -O android-ndk-r25b-linux.zip https://redirector.gvt1.com/edgedl/android/repository/android-ndk-r25b-linux.zip
          fi
          unzip -q android-ndk-r25b-linux.zip
          echo "NDK pre-downloaded successfully"

      - name: Build APK
        run: |
          buildozer init
          sed -i 's/title = My Application/title = Super Tic Tac Toe/' buildozer.spec
          sed -i 's/package.name = myapp/package.name = supertic/' buildozer.spec
          sed -i 's/package.domain = org.test/package.domain = org.supertic/' buildozer.spec
          sed -i 's/requirements = python3,kivy/requirements = python3,pygame,requests,websocket-client/' buildozer.spec
          sed -i 's/#android.permissions = .*/android.permissions = INTERNET/' buildozer.spec
          sed -i 's/#android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
          # Указываем buildozer не скачивать NDK, он уже есть
          export PATH=$PATH:~/.buildozer/android/platform/android-ndk-r25b
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: supertic-apk
          path: bin/*.apk
